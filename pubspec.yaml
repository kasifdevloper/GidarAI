name: gidar_ai_flutter
description: Gidar AI rebuilt in Flutter with polished UI, persistent chats, and OpenRouter streaming.
publish_to: "none"
version: 2.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1
  file_picker: ^8.1.2
  flutter_markdown: ^0.7.4+1
  flutter_math_fork: ^0.7.3
  markdown: ^7.3.1
  lottie: ^3.1.2
  flutter_riverpod: ^2.6.1
  flutter_secure_storage: ^10.0.0
  go_router: ^14.6.2
  google_fonts: ^6.2.1
  http: ^1.3.0
  image_picker: ^1.1.2
  path: ^1.9.1
  path_provider: ^2.1.5
  pdf: ^3.11.1
  printing: ^5.14.0
  screenshot: ^3.0.0
  share_plus: ^10.1.2
  shared_preferences: ^2.5.3
  sqlite3_flutter_libs: ^0.5.28
  url_launcher: ^6.3.1
  webview_flutter: ^4.10.0
  drift: ^2.22.1
  package_info_plus: ^9.0.0
  highlight: ^0.7.0
  dynamic_color: ^1.7.0
  flutter_widget_from_html: ^0.17.1
  html: ^0.15.6

dev_dependencies:
  build_runner: ^2.4.13
  drift_dev: ^2.22.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/NirmalaUI-Regular.ttf
    - assets/fonts/NirmalaUI-Bold.ttf
    - assets/fonts/pdf/GoNotoCurrent-Regular.ttf
    - assets/fonts/pdf/GoNotoCurrent-Bold.ttf
    - assets/fonts/pdf/Noto-COLRv1-emojicompat.ttf
    - assets/gidar_logo.svg
    - assets/gidar_logo_mark.png
    - assets/animations/lottieflow-chat-17-10-000000-easey.json
  fonts:
    - family: NirmalaUI
      fonts:
        - asset: assets/fonts/NirmalaUI-Regular.ttf
          weight: 400
        - asset: assets/fonts/NirmalaUI-Bold.ttf
          weight: 700
